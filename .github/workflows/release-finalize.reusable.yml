name: Release · Finalize (Reusable)

on:
  workflow_call:
    inputs:
      release_key:
        type: string
        required: true
      manifest_dir:
        type: string
        required: false
        default: releases
      notion_gubun_name:
        type: string
        required: true
    secrets:
      notion_token:
        required: true
      notion_db_id:
        required: true

permissions:
  contents: write
  pull-requests: read

jobs:
  finalize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Resolve metadata path
        id: meta
        shell: bash
        env:
          RELEASE_KEY: ${{ inputs.release_key }}
          MANIFEST_DIR: ${{ inputs.manifest_dir }}
        run: |
          set -euo pipefail
          META_PATH="${MANIFEST_DIR}/${RELEASE_KEY}.yml"
          if [ ! -f "$META_PATH" ]; then
            echo "::error::metadata not found: $META_PATH"
            exit 1
          fi
          echo "path=$META_PATH" >> "$GITHUB_OUTPUT"

      # 1) 게이트: 모든 서비스 result가 DEPLOYED 또는 SKIPPED인지 검사
      - name: Gate - validate service statuses
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import sys, yaml
          path = "${{ steps.meta.outputs.path }}"
          with open(path, "r", encoding="utf-8") as f:
            doc = yaml.safe_load(f) or {}

          services = doc.get("services") or {}
          if not services:
            print(f"::error::services is empty in {path}")
            sys.exit(1)

          bad = []
          for name, s in services.items():
            st = (s or {}).get("result")
            if st not in ("DEPLOYED", "SKIPPED"):
              bad.append((name, st))

          if bad:
            msg = ", ".join([f"{n}={st}" for n, st in bad])
            print(f"::error::not ready to finalize. invalid service results: {msg}")
            sys.exit(1)

          print("::notice::gate passed.")
          PY

      # 2) metadata status FINALIZED + bundle.tag/meta.finalizedAt만 채움
      - name: Update metadata status to FINALIZED
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import yaml
          from datetime import datetime, timezone

          path = "${{ steps.meta.outputs.path }}"
          release_key = "${{ inputs.release_key }}"
          tag = f"bundle/{release_key}"

          with open(path, "r", encoding="utf-8") as f:
            doc = yaml.safe_load(f) or {}

          doc["status"] = "FINALIZED"

          bundle = doc.get("bundle") or {}
          bundle["tag"] = tag
          doc["bundle"] = bundle

          meta = doc.get("meta") or {}
          meta["finalizedAt"] = datetime.now(timezone.utc).isoformat().replace("+00:00", "Z")
          doc["meta"] = meta

          with open(path, "w", encoding="utf-8") as f:
            yaml.safe_dump(doc, f, sort_keys=False, allow_unicode=True)
          PY

      # 3) 커밋 & 푸시
      - name: Commit metadata finalize (idempotent)
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add "${{ steps.meta.outputs.path }}"
          if git diff --cached --quiet; then
            echo "::notice::no metadata changes to commit"
          else
            git commit -m "chore(release): finalize [RN-BOT][RN-FINALIZE] (${{ inputs.release_key }})"
            git push
          fi

          SHA="$(git rev-parse HEAD)"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "::notice::final manifest sha=${SHA}"

      # 4) bundle/<releaseKey> 태그 생성/푸시 (멱등 + 검증)
      - name: Create & push bundle tag (idempotent + verify)
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_KEY="${{ inputs.release_key }}"
          TAG="bundle/${RELEASE_KEY}"
          SHA="$(git rev-parse HEAD)"

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            EXISTING="$(git rev-list -n 1 "${TAG}")"
            if [ "${EXISTING}" != "${SHA}" ]; then
              echo "::error::tag already exists but points to different commit. tag=${TAG} existing=${EXISTING} expected=${SHA}"
              exit 1
            fi
            echo "::notice::tag already exists and matches: ${TAG} -> ${SHA}"
          else
            git tag -a "${TAG}" "${SHA}" -m "Release bundle ${RELEASE_KEY}"
            git push origin "${TAG}"
            echo "::notice::tag pushed: ${TAG} -> ${SHA}"
          fi

      # 5) Notion: 제목=release_key AND 구분=<input> 인 페이지 찾아 "상태"=배포완료로 변경
      - name: Update Notion 상태 to 배포완료
        shell: bash
        env:
          NOTION_TOKEN: ${{ secrets.notion_token }}
          NOTION_DB_ID: ${{ secrets.notion_db_id }}
          RELEASE_KEY: ${{ inputs.release_key }}
          NOTION_GUBUN_NAME: ${{ inputs.notion_gubun_name }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os, json, sys
          import urllib.request, urllib.error

          NOTION_TOKEN = os.environ["NOTION_TOKEN"]
          DB_ID = os.environ["NOTION_DB_ID"]
          RELEASE_KEY = os.environ["RELEASE_KEY"]
          GUBUN_NAME = os.environ.get("NOTION_GUBUN_NAME", "백엔드")

          NOTION_VERSION = "2025-09-03"
          GUBUN_PROP = "구분"
          STATUS_PROP = "상태"
          STATUS_NAME = "배포완료"

          def req(method, url, body=None):
            data = None if body is None else json.dumps(body).encode("utf-8")
            r = urllib.request.Request(url, data=data, method=method)
            r.add_header("Authorization", f"Bearer {NOTION_TOKEN}")
            r.add_header("Notion-Version", NOTION_VERSION)
            r.add_header("Content-Type", "application/json")
            try:
              with urllib.request.urlopen(r) as resp:
                raw = resp.read().decode("utf-8")
                return resp.status, json.loads(raw) if raw else {}
            except urllib.error.HTTPError as e:
              raw = e.read().decode("utf-8")
              try:
                return e.code, json.loads(raw) if raw else {"error": raw}
              except Exception:
                return e.code, {"error": raw}

          def get_title_prop_name(schema: dict) -> str:
            props = schema.get("properties") or {}
            for name, p in props.items():
              if isinstance(p, dict) and p.get("type") == "title":
                return name
            return ""

          def prop_type(schema: dict, name: str) -> str:
            return ((schema.get("properties") or {}).get(name) or {}).get("type") or ""

          st, db = req("GET", f"https://api.notion.com/v1/databases/{DB_ID}")
          if st >= 400:
            print(f"::error::Notion database retrieve failed ({st}): {db}")
            sys.exit(1)

          data_sources = db.get("data_sources") or []
          if not data_sources:
            data_sources = [{"id": DB_ID, "name": "fallback"}]

          page_id = None
          for ds in data_sources:
            ds_id = ds.get("id")
            if not ds_id:
              continue

            st, schema = req("GET", f"https://api.notion.com/v1/data_sources/{ds_id}")
            if st >= 400:
              print(f"::warning::Retrieve data source failed ({st}) for {ds_id}: {schema}")
              continue

            title_prop = get_title_prop_name(schema)
            if not title_prop:
              print(f"::warning::No title property in data source {ds_id}. skip.")
              continue

            gubun_t = prop_type(schema, GUBUN_PROP)
            if gubun_t == "select":
              gubun_filter = {"property": GUBUN_PROP, "select": {"equals": GUBUN_NAME}}
            elif gubun_t == "multi_select":
              gubun_filter = {"property": GUBUN_PROP, "multi_select": {"contains": GUBUN_NAME}}
            else:
              print(f"::warning::'{GUBUN_PROP}' type is '{gubun_t}' in {ds_id}. skip.")
              continue

            query_payload = {
              "page_size": 100,
              "filter": {
                "and": [
                  {"property": title_prop, "title": {"equals": RELEASE_KEY}},
                  gubun_filter
                ]
              }
            }

            cursor = None
            while True:
              if cursor:
                query_payload["start_cursor"] = cursor
              else:
                query_payload.pop("start_cursor", None)

              st, res = req("POST", f"https://api.notion.com/v1/data_sources/{ds_id}/query", query_payload)
              if st >= 400:
                print(f"::warning::Query data source failed ({st}) for {ds_id}: {res}")
                break

              results = res.get("results") or []
              if results:
                page_id = results[0].get("id")
                break

              if not res.get("has_more"):
                break
              cursor = res.get("next_cursor")

            if page_id:
              break

          if not page_id:
            print(f"::error::Notion page not found. 조건: {GUBUN_PROP}={GUBUN_NAME} AND 제목={RELEASE_KEY}")
            sys.exit(1)

          st, page = req("GET", f"https://api.notion.com/v1/pages/{page_id}")
          if st >= 400:
            print(f"::error::Notion page retrieve failed ({st}): {page}")
            sys.exit(1)

          props = page.get("properties") or {}
          cur = None
          if STATUS_PROP in props and props[STATUS_PROP].get("type") == "select":
            cur = (props[STATUS_PROP].get("select") or {}).get("name")

          if cur == STATUS_NAME:
            print("::notice::Notion 상태 already 배포완료 (idempotent).")
            sys.exit(0)

          patch = {"properties": {STATUS_PROP: {"select": {"name": STATUS_NAME}}}}
          st, out = req("PATCH", f"https://api.notion.com/v1/pages/{page_id}", patch)
          if st >= 400:
            print(f"::error::Notion page update failed ({st}): {out}")
            sys.exit(1)

          print(f"::notice::Notion updated: page_id={page_id}, 상태=배포완료")
          PY

      # 6) GitHub Release 생성 (태그 기준), generate notes 사용
      - name: Create GitHub Release (generate notes)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RELEASE_KEY="${{ inputs.release_key }}"
          TAG="bundle/${RELEASE_KEY}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::notice::release already exists for tag: $TAG"
            exit 0
          fi

          gh release create "$TAG" \
            --title "Release ${RELEASE_KEY}" \
            --generate-notes
