name: Reusable Notify

on:
  workflow_call:
    inputs:
      event_kind:
        description: "push | pr | merge | deploy"
        required: true
        type: string
      project:
        description: "project/service name (deploy 전송용)"
        required: false
        type: string
      environment:
        description: "environment (dev|stg|prod 등, deploy 전송용)"
        required: false
        type: string
      result:
        description: "deploy result (success|failure, deploy 전송용)"
        required: false
        type: string
      message:
        description: "deploy message (deploy 전송용)"
        required: false
        type: string
      tag:
        description: "deployed tag (deploy 전송용)"
        required: false
        type: string

jobs:
  format_and_send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          fetch-depth: 0

      # message 우선순위 결정
      - name: Build unified message
        id: msg
        shell: bash
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          REF="${{ github.ref_name }}"
          RUN_URL="https://github.com/${REPO}/actions/runs/${{ github.run_id }}"
          EVENT="${{ inputs.event_kind }}"

          # 커밋 정보 (없어도 실패하지 않도록)
          COMMIT_MSG="$(git log -1 --pretty=%s 2>/dev/null || true)"
          COMMITS_URL="https://github.com/${REPO}/commits/${REF}"

          case "$EVENT" in
            deploy)
              PROJECT="${{ inputs.project }}"
              ENVNAME="${{ inputs.environment }}"
              RESULT="${{ inputs.result }}"
              IMAGE="${{ inputs.image }}"
              TAG="${{ inputs.tag }}"
          
              INPUT_MESSAGE="${{ inputs.message || '' }}"
              PUSH_MESSAGE="${{ github.event.head_commit.message || '' }}"
              PR_TITLE="${{ github.event.pull_request.title || '' }}"    

              MESSAGE="${INPUT_MESSAGE}"
              if [[ -z "$MESSAGE" && -n "${PUSH_MESSAGE}" ]]; then
              MESSAGE="${PUSH_MESSAGE}"
              fi
              if [[ -z "$MESSAGE" && -n "${PR_TITLE}" ]]; then
              MESSAGE="${PR_TITLE}"
              fi
              if [[ -z "$MESSAGE" ]]; then
              MESSAGE="$(git log -1 --pretty=%s 2>/dev/null || true)"
              fi
              if [[ -z "$MESSAGE" ]]; then
              MESSAGE="deploy by ${{ github.actor }}"
              fi
              MESSAGE="${MESSAGE%%$'\n'*}"
    
              if [[ "${RESULT:-}" == "success" ]]; then
                ICON="✅"; RESULT_UPPER="SUCCESS"
              else
                ICON="❌"; RESULT_UPPER="FAILED"
              fi
          
              MSG="${ICON} *DEPLOY ${RESULT_UPPER}*
              Project: ${PROJECT}
              Env:     ${ENVNAME}
              Message: ${MESSAGE}"
                [[ -n "${TAG:-}"   ]] && MSG="${MSG}
              Tag:     ${TAG}"
                [[ -n "${IMAGE:-}" ]] && MSG="${MSG}
              Image:   ${IMAGE}"
                [[ -n "${IMAGE:-}" ]] && MSG="${MSG}
              Image:   ${IMAGE}"
                MSG="${MSG}
          
              ▶️ Workflow Run: ${RUN_URL}"
            ;;
          
            push)
              # head_commit.message가 없을 수도 있으니 COMMIT_MSG로 대체
              TITLE="${COMMIT_MSG}"
              MSG="🔔 *PUSH to ${REF}*
              Repo: ${REPO}
              By: ${ACTOR}
              Message: ${TITLE}
          
              ▶️ Recent Commits: ${COMMITS_URL}
              ▶️ Workflow Run: ${RUN_URL}"
            ;;

            pr)
              PR_NUM="${{ github.event.pull_request.number }}"
              PR_TITLE="${{ github.event.pull_request.title }}"
              PR_USER="${{ github.event.pull_request.user.login }}"
              PR_URL="${{ github.event.pull_request.html_url }}"
              BASE="${{ github.event.pull_request.base.ref }}"
              HEAD="${{ github.event.pull_request.head.ref }}"
          
              MSG="🧩 *PR to ${BASE}*
              Repo: ${REPO}
              PR: #${PR_NUM} - ${PR_TITLE}
              From: ${HEAD} → ${BASE}
              By: ${PR_USER}
          
              ▶️ PR: ${PR_URL}
              ▶️ Workflow Run: ${RUN_URL}"
            ;;
          
            merge)
              PR_NUM="${{ github.event.pull_request.number }}"
              PR_TITLE="${{ github.event.pull_request.title }}"
              MERGER="${ACTOR}"
              PR_URL="${{ github.event.pull_request.html_url }}"
              BASE="${{ github.event.pull_request.base.ref }}"
              HEAD="${{ github.event.pull_request.head.ref }}"
          
              MSG="✅ *MERGED into ${BASE}*
              Repo: ${REPO}
              PR: #${PR_NUM} - ${PR_TITLE}
              From: ${HEAD} → ${BASE}
              Merged By: ${MERGER}
          
              ▶️ PR: ${PR_URL}
              ▶️ Workflow Run: ${RUN_URL}"
              ;;
          
              *)
                MSG="ℹ️ Unsupported event_kind: ${EVENT}
                Repo: ${REPO}
                ▶️ Workflow Run: ${RUN_URL}"
              ;;
          
              esac  
              {
                printf 'text<<EOF\n'
                printf '%s\n' "$MSG"
                printf 'EOF\n'
              } >> "$GITHUB_OUTPUT"

      - name: Decide chat target by event_kind
        id: route
        shell: bash
        run: |
          set -euo pipefail
          EVENT="${{ inputs.event_kind }}"
          TO_DEFAULT="${{ secrets.TELEGRAM_TO }}"
          case "$EVENT" in
          push)   TO="${{ secrets.TELEGRAM_TO_PUSH }}"   ;;
          pr)     TO="${{ secrets.TELEGRAM_TO_PR }}"     ;;
          merge)  TO="${{ secrets.TELEGRAM_TO_MERGE }}"  ;;
          deploy) TO="${{ secrets.TELEGRAM_TO_DEPLOY }}" ;;
          *)      TO="" ;;
          
          esac
          [[ -z "${TO:-}" ]] && TO="$TO_DEFAULT"
          echo "to=$TO" >> "$GITHUB_OUTPUT"

      - name: Send Telegram
        uses: 5n-project/github-actions-module/actions/notify-telegram@v1
        with:
          bot_token: ${{ secrets.TELEGRAM_TOKEN }}
          chat_id: ${{ steps.route.outputs.to }}
          message: ${{ steps.msg.outputs.text }}